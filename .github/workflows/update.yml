name: Lotto Max Auto Analysis

on:
  workflow_dispatch: # 容許你手動撳掣執行

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Dependencies
        run: pip install pandas
      - name: Run Script
        run: python scraper.py
      - name: Commit Results
        run: |
          git config --global user.name 'Data Analyst Bot'
          git config --global user.email 'bot@noreply.github.com'
          git add data.csv
          git commit -m "Auto-calculate: Odd/Even, Consecutive, Repeats" || exit 0
          git push
